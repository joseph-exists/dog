services:
  db:
    image: timescale/timescaledb-ha:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/home/postgres/pgdata/data
    env_file:
      - .env
    environment:
      - PGDATA=/home/postgres/pgdata/data
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
  # vectorizer-worker:
  #   image: timescale/pgai-vectorizer-worker:latest
  #   environment:
  #     PGAI_VECTORIZER_WORKER_DB_URL: postgres://postgres:postgres@db:5432/tinyfoot
  #   command: ["--poll-interval", "180s", "--log-level", "DEBUG"]

  redis:
    image: redis:8.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  kennel:
    build:
      context: ./kennel
    restart: always
    privileged: true                        # required for LXC namespace control
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    devices:
      - /dev/dxg:/dev/dxg # WSL2 GPU paravirt interface
    security_opt:
      - seccomp:unconfined
    networks:
      - traefik-public
      - default
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - KENNEL_REDIS_HOST=redis
      - KENNEL_REDIS_PORT=${REDIS_PORT:-6379}
      - KENNEL_REDIS_EVENT_CHANNEL=${KENNEL_REDIS_EVENT_CHANNEL:-kennel:events}
      - KENNEL_BASE_IMAGE=${KENNEL_BASE_IMAGE:-ubuntu}
      - KENNEL_BASE_RELEASE=${KENNEL_BASE_RELEASE:-noble}
      - KENNEL_MAX_ENVS=${KENNEL_MAX_ENVS:-20}
      - KENNEL_SECRET=${KENNEL_SECRET?Variable not set}  # shared with backend for auth
      - KENNEL_TINYFOOT_API_URL=${KENNEL_TINYFOOT_API_URL:-http://10.0.3.1:8000}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw   # cgroup access for LXC
      - /lib/modules:/lib/modules:ro        # kernel modules
      - kennel-containers:/var/lib/lxc      # persisted container storage
      - kennel-logs:/var/log/lxc
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro # WSL2 CUDA BRIDGE LIBS
    tmpfs:
      - /run
      - /run/lock
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-kennel.loadbalancer.server.port=8090
      # REST API route
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.rule=Host(`kennel.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.tls.certresolver=le
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.rule=Host(`kennel.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.middlewares=https-redirect
      # WebSocket requires buffering off and timeout extension
      - traefik.http.middlewares.kennel-ws.buffering.maxRequestBodyBytes=0
      - traefik.http.middlewares.kennel-ws.buffering.maxResponseBodyBytes=0
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.middlewares=kennel-ws


  # adminer:
  #   image: adminer
  #   restart: always
  #   networks:
  #     - traefik-public
  #     - default
  #   depends_on:
  #     - db
  #   environment:
  #     - ADMINER_DESIGN=pepa-linha-dark
  #   labels:
  #     - traefik.enable=true
  #     - traefik.docker.network=traefik-public
  #     - traefik.constraint-label=traefik-public
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.rule=Host(`adminer.${DOMAIN?Variable not set}`)
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.entrypoints=http
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.middlewares=https-redirect
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.rule=Host(`adminer.${DOMAIN?Variable not set}`)
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.entrypoints=https
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls=true
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls.certresolver=le
  #     - traefik.http.services.${STACK_NAME?Variable not set}-adminer.loadbalancer.server.port=8080

  prestart:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    build:
      context: ./backend
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SENTRY_DSN=${SENTRY_DSN}

  mcpmvp:
    build:
      context: ./mcpmvp
    restart: always
    environment:
      - MCPMVP_HOST=0.0.0.0
      - MCPMVP_PORT=8080
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      mcpmvp:
        condition: service_healthy
      tesser:
        condition: service_started
      gittin:
        condition: service_started
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - KENNEL_BASE_URL=http://kennel:8090
      - KENNEL_WS_BASE_URL=ws://kennel:8090
      - KENNEL_EXTERNAL_WS_BASE_URL=${KENNEL_EXTERNAL_WS_BASE_URL:-ws://localhost:8090}
      - SENTRY_DSN=${SENTRY_DSN}
      - SHADOW_REPOS_PATH=/tmp/shadows
      - SHADOW_REPO_URL_TEMPLATE=${SHADOW_REPO_URL_TEMPLATE:-}
      - SHADOW_REPO_DEFAULT_BRANCH=${SHADOW_REPO_DEFAULT_BRANCH:-main}
      - SHADOW_GOGS_BASE_URL=${SHADOW_GOGS_BASE_URL:-}
      - SHADOW_GOGS_ORG=${SHADOW_GOGS_ORG:-shadow}
      - SHADOW_GOGS_TOKEN=${SHADOW_GOGS_TOKEN:-}
      - SHADOW_GOGS_TIMEOUT_SECONDS=${SHADOW_GOGS_TIMEOUT_SECONDS:-10}
      - TESSER_REDIS_HOST=redis
      - TESSER_REDIS_PORT=${REDIS_PORT:-6379}
      - TESSER_REQUEST_CHANNEL=${TESSER_REQUEST_CHANNEL:-tesser:requests}
      - TESSER_RESPONSE_CHANNEL=${TESSER_RESPONSE_CHANNEL:-tesser:responses}
      - MCPMVP_BASE_URL=http://mcpmvp:8080

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/api/v1/utils/health-check/",
        ]
      interval: 100000s
      timeout: 5s
      retries: 5

    build:
      context: ./backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect


  outbox-worker:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
      gittin:
        condition: service_started
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SHADOW_REPOS_PATH=/data/shadows
      - SHADOW_REPO_URL_TEMPLATE=${SHADOW_REPO_URL_TEMPLATE:-}
      - SHADOW_REPO_DEFAULT_BRANCH=${SHADOW_REPO_DEFAULT_BRANCH:-main}
      # Use Docker network hostname for Gogs API access
      - SHADOW_GOGS_BASE_URL=http://gittin:3000
      - SHADOW_GOGS_ORG=${SHADOW_GOGS_ORG:-shadow}
      - SHADOW_GOGS_TOKEN=${SHADOW_GOGS_TOKEN:-}
      - SHADOW_GOGS_TIMEOUT_SECONDS=${SHADOW_GOGS_TIMEOUT_SECONDS:-10}
      - SHADOW_OUTBOX_POLL_INTERVAL_SECONDS=${SHADOW_OUTBOX_POLL_INTERVAL_SECONDS:-5}
      - SHADOW_OUTBOX_BATCH_SIZE=${SHADOW_OUTBOX_BATCH_SIZE:-10}
      - SHADOW_OUTBOX_LOG_LEVEL=${SHADOW_OUTBOX_LOG_LEVEL:-INFO}
    volumes:
      - shadow-repos-data:/data/shadows
    build:
      context: ./backend
    command: ["python", "-m", "app.services.outbox_worker"]

  tesser:
    build:
      context: ./tesser
      target: export
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TESSER_REDIS_HOST=redis
      - TESSER_REDIS_PORT=${REDIS_PORT:-6379}
      - TESSER_REDIS_DB=${TESSER_REDIS_DB:-0}
      - TESSER_REQUEST_CHANNEL=${TESSER_REQUEST_CHANNEL:-tesser:requests}
      - TESSER_RESPONSE_CHANNEL=${TESSER_RESPONSE_CHANNEL:-tesser:responses}
      - TESSER_LOG_LEVEL=${TESSER_LOG_LEVEL:-INFO}
      - TESSER_ARTIFACTS_ROOT=/data/artifacts/redis-bridge
      - TESSER_BRIDGE_WORKER_ID=${TESSER_BRIDGE_WORKER_ID:-tesser-bridge}
      - TESSER_CORE_WORKER_ID=${TESSER_CORE_WORKER_ID:-tesser-worker-core}
      - TESSER_EXPORT_WORKER_ID=${TESSER_EXPORT_WORKER_ID:-tesser-worker-export}
      - TESSER_CORE_TIMEOUT_SECONDS=${TESSER_CORE_TIMEOUT_SECONDS:-180}
      - TESSER_EXPORT_TIMEOUT_SECONDS=${TESSER_EXPORT_TIMEOUT_SECONDS:-600}
    volumes:
      - tesser_jobs_data:/data/jobs
      - tesser_artifacts_data:/data/artifacts

  gittin:
    build:
      context: ./gittin
    restart: always
    networks:
      - traefik-public
      - default
    environment:
      - GITTIN_DOMAIN=git.${DOMAIN?Variable not set}
      - GITTIN_EXTERNAL_URL=https://git.${DOMAIN?Variable not set}/
      - GITTIN_SSH_PORT=${GITTIN_SSH_PORT:-2222}
      - GITTIN_SSH_LISTEN_PORT=2222
    volumes:
      - ./volumes/shadows:/data/git
      - ./gittin/data:/data/gogs
      - ./gittin/ssh:/data/ssh
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-gittin.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.rule=Host(`git.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.rule=Host(`git.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls.certresolver=le

  frontend:
    image: "${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}"
    restart: always
    networks:
      - traefik-public
      - default
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

volumes:
  app-db-data:
  # forgejo-db-data:  # Commented out - Forgejo replaced by local git
  tesser_jobs_data:
  tesser_artifacts_data:
  shadow-repos-data:  # Local git staging for shadow versioning
  kennel-containers:
  kennel-logs:

networks:
  traefik-public:
    # Allow setting it to false for testing
    external: false
