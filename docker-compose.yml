services:
  db:
    image: timescale/timescaledb-ha:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/home/postgres/pgdata/data
    env_file:
      - .env
    environment:
      - PGDATA=/home/postgres/pgdata/data
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
  # vectorizer-worker:
  #   image: timescale/pgai-vectorizer-worker:latest
  #   environment:
  #     PGAI_VECTORIZER_WORKER_DB_URL: postgres://postgres:postgres@db:5432/tinyfoot
  #   command: ["--poll-interval", "180s", "--log-level", "DEBUG"]

  redis:
    image: redis:8.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  # adminer:
  #   image: adminer
  #   restart: always
  #   networks:
  #     - traefik-public
  #     - default
  #   depends_on:
  #     - db
  #   environment:
  #     - ADMINER_DESIGN=pepa-linha-dark
  #   labels:
  #     - traefik.enable=true
  #     - traefik.docker.network=traefik-public
  #     - traefik.constraint-label=traefik-public
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.rule=Host(`adminer.${DOMAIN?Variable not set}`)
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.entrypoints=http
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.middlewares=https-redirect
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.rule=Host(`adminer.${DOMAIN?Variable not set}`)
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.entrypoints=https
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls=true
  #     - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls.certresolver=le
  #     - traefik.http.services.${STACK_NAME?Variable not set}-adminer.loadbalancer.server.port=8080

  prestart:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    build:
      context: ./backend
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SENTRY_DSN=${SENTRY_DSN}

  backend:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      tesser:
        condition: service_started
      gittin:
        condition: service_started
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SENTRY_DSN=${SENTRY_DSN}
      - SHADOW_REPOS_PATH=/tmp/shadows
      - SHADOW_REPO_URL_TEMPLATE=${SHADOW_REPO_URL_TEMPLATE:-}
      - SHADOW_REPO_DEFAULT_BRANCH=${SHADOW_REPO_DEFAULT_BRANCH:-main}
      - SHADOW_GOGS_BASE_URL=${SHADOW_GOGS_BASE_URL:-}
      - SHADOW_GOGS_ORG=${SHADOW_GOGS_ORG:-shadow}
      - SHADOW_GOGS_TOKEN=${SHADOW_GOGS_TOKEN:-}
      - SHADOW_GOGS_TIMEOUT_SECONDS=${SHADOW_GOGS_TIMEOUT_SECONDS:-10}
      - TESSER_REDIS_HOST=redis
      - TESSER_REDIS_PORT=${REDIS_PORT:-6379}
      - TESSER_REQUEST_CHANNEL=${TESSER_REQUEST_CHANNEL:-tesser:requests}
      - TESSER_RESPONSE_CHANNEL=${TESSER_RESPONSE_CHANNEL:-tesser:responses}

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/api/v1/utils/health-check/",
        ]
      interval: 100000s
      timeout: 5s
      retries: 5

    build:
      context: ./backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect


  # shadow-outbox-worker:
  #   image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}-shadow-worker"
  #   restart: always
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #       restart: true
  #     db:
  #       condition: service_healthy
  #       restart: true
  #   env_file:
  #     - .env
  #   environment:
  #     - SHADOW_REPOS_PATH=/tmp/shadows
  #     - SHADOW_REPO_URL_TEMPLATE=${SHADOW_REPO_URL_TEMPLATE:-}
  #     - SHADOW_REPO_DEFAULT_BRANCH=${SHADOW_REPO_DEFAULT_BRANCH:-main}
  #     - SHADOW_GOGS_BASE_URL=${SHADOW_GOGS_BASE_URL:-}
  #     - SHADOW_GOGS_ORG=${SHADOW_GOGS_ORG:-shadow}
  #     - SHADOW_GOGS_TOKEN=${SHADOW_GOGS_TOKEN:-}
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.worker
  #   command: ["python", "-m", "app.services.shadow_outbox_worker"]

  tesser:
    build:
      context: ./tesser
      target: export
    command:
      - python
      - -m
      - tesserax_service.redis_bridge
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TESSER_REDIS_HOST=redis
      - TESSER_REDIS_PORT=${REDIS_PORT:-6379}
      - TESSER_REDIS_DB=${TESSER_REDIS_DB:-0}
      - TESSER_REQUEST_CHANNEL=${TESSER_REQUEST_CHANNEL:-tesser:requests}
      - TESSER_RESPONSE_CHANNEL=${TESSER_RESPONSE_CHANNEL:-tesser:responses}
      - TESSER_WORKER_ID=${TESSER_WORKER_ID:-tesser-worker-1}
      - TESSER_LOG_LEVEL=${TESSER_LOG_LEVEL:-INFO}
      - TESSER_ARTIFACTS_ROOT=/data/artifacts/redis-bridge

  gittin:
    build:
      context: ./gittin
    restart: always
    networks:
      - traefik-public
      - default
    environment:
      - GITTIN_DOMAIN=git.${DOMAIN?Variable not set}
      - GITTIN_EXTERNAL_URL=https://git.${DOMAIN?Variable not set}/
      - GITTIN_SSH_PORT=${GITTIN_SSH_PORT:-2222}
      - GITTIN_SSH_LISTEN_PORT=2222
    volumes:
      - ./volumes/shadows:/data/git
      - ./gittin/data:/data/gogs
      - ./gittin/ssh:/data/ssh
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-gittin.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.rule=Host(`git.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.rule=Host(`git.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls.certresolver=le

  frontend:
    image: "${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}"
    restart: always
    networks:
      - traefik-public
      - default
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

volumes:
  app-db-data:
  # forgejo-db-data:  # Commented out - Forgejo replaced by local git


networks:
  traefik-public:
    # Allow setting it to false for testing
    external: false
