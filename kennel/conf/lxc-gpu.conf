# kennel/conf/lxc-gpu.conf

# /dev/dxg — WSL2 GPU paravirt device (major 10, minor varies, current is 125)
# Use optional so non-GPU hosts don't hard-fail
lxc.cgroup2.devices.allow = c 10:125 rwm
lxc.mount.entry = /dev/dxg dev/dxg none bind,optional,create=file 0 0

# DRI devices if present (some WSL2 kernels expose these too)
# lxc.mount.entry = /dev/dri dev/dri none bind,optional,create=dir 0 0

# WSL CUDA libraries — critical, these are the actual CUDA implementation
lxc.mount.entry = /usr/lib/wsl/lib usr/lib/wsl/lib none bind,ro,optional,create=dir 0 0

# cgroup device access for dxg (char device major 10)
lxc.cgroup2.devices.allow = c 10:* rwm