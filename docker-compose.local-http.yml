services:
  kennel:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-kennel.loadbalancer.server.port=8090
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.rule=Host(`kennel.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.service=${STACK_NAME?Variable not set}-kennel
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-http.middlewares=
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.rule=
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.entrypoints=
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.tls=
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.tls.certresolver=
      - traefik.http.routers.${STACK_NAME?Variable not set}-kennel-https.middlewares=

  backend:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.service=${STACK_NAME?Variable not set}-backend
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=

  gittin:
    environment:
      - GITTIN_DOMAIN=git.${DOMAIN?Variable not set}
      - GITTIN_EXTERNAL_URL=http://git.${DOMAIN?Variable not set}/
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-gittin.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.rule=Host(`git.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.service=${STACK_NAME?Variable not set}-gittin
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-http.middlewares=
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.rule=
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.entrypoints=
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls=
      - traefik.http.routers.${STACK_NAME?Variable not set}-gittin-https.tls.certresolver=

  frontend:
    build:
      args:
        - VITE_API_URL=http://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.service=${STACK_NAME?Variable not set}-frontend
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=
